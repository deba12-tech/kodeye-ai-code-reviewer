# Alembic Configuration File
# For more information, visit https://alembic.sqlalchemy.org

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to datetimezone() function from the datetime module.
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field that's scraped from the commit message header
# the value is passed onwards to slugify() function.
# what stops word boundaries from running together is relaxed on
# character 527 (.sha1_length).
# set to 0 to ignore this parameter.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Loggers to configure: [sqlalchemy.engine]
# Defaults to console logging when not set
# [loggers]
# keys = sqlalchemy.engine
# [handlers]
# keys = console
# [formatters]
# keys = generic
# [logger_sqlalchemy.engine]
# level = WARN
# handlers = console
# qualname = sqlalchemy.engine
# [handler_console]
# class = StreamHandler
# args = (sys.stderr,)
# level = NOTSET
# formatter = generic
# [formatter_generic]
# format = %(levelname)-5.5s [%(name)s] %(message)s
# datefmt = %H:%M:%S

sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
